# MatterGen Multi-Property Fine-tuning Configuration Template
# 
# This file contains example configurations for fine-tuning MatterGen
# to generate structures conditioned on multiple properties.
#
# Usage: Copy and modify these commands for your specific needs.

# =============================================================================
# BASIC SETUP AND PREPARATION
# =============================================================================

# 1. Dataset preparation
# ----------------------
# For MP-20 dataset (smaller, faster):
git lfs pull -I data-release/mp-20/ --exclude=""
unzip data-release/mp-20/mp_20.zip -d datasets
csv-to-dataset --csv-folder datasets/mp_20/ --dataset-name mp_20 --cache-folder datasets/cache

# For Alex-MP-20 dataset (larger, better results):
git lfs pull -I data-release/alex-mp/alex_mp_20.zip --exclude=""
unzip data-release/alex-mp/alex_mp_20.zip -d datasets
csv-to-dataset --csv-folder datasets/alex_mp_20/ --dataset-name alex_mp_20 --cache-folder datasets/cache

# =============================================================================
# FINE-TUNING CONFIGURATIONS
# =============================================================================

# Configuration 1: Target Multi-Property Fine-tuning
# ---------------------------------------------------
# This exactly matches the properties needed for the provided generation command
# Properties: chemical_system, energy_above_hull, dft_band_gap, space_group

export BASE_MODEL="mattergen_base"
export DATASET="mp_20"  # or "alex_mp_20"
export OUTPUT_DIR="outputs/multi_property_target_$(date +%Y%m%d_%H%M%S)"

mattergen-finetune \
  adapter.pretrained_name=$BASE_MODEL \
  data_module=$DATASET \
  +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.chemical_system=chemical_system \
  +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.energy_above_hull=energy_above_hull \
  +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.dft_band_gap=dft_band_gap \
  +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.space_group=space_group \
  ~trainer.logger \
  data_module.properties=["chemical_system","energy_above_hull","dft_band_gap","space_group"] \
  trainer.max_epochs=200 \
  lightning_module.optimizer_partial.lr=5e-6 \
  hydra.run.dir=$OUTPUT_DIR

# Configuration 2: Progressive Fine-tuning (Recommended Approach)
# ---------------------------------------------------------------
# Start with fewer properties and gradually add more

# Step 1: Fine-tune on chemical_system and energy_above_hull
export STEP1_DIR="outputs/step1_chemical_energy_$(date +%Y%m%d_%H%M%S)"

mattergen-finetune \
  adapter.pretrained_name=mattergen_base \
  data_module=mp_20 \
  +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.chemical_system=chemical_system \
  +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.energy_above_hull=energy_above_hull \
  ~trainer.logger \
  data_module.properties=["chemical_system","energy_above_hull"] \
  trainer.max_epochs=150 \
  hydra.run.dir=$STEP1_DIR

# Step 2: Add dft_band_gap
export STEP2_DIR="outputs/step2_add_bandgap_$(date +%Y%m%d_%H%M%S)"

mattergen-finetune \
  adapter.model_path=$STEP1_DIR \
  data_module=mp_20 \
  +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.chemical_system=chemical_system \
  +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.energy_above_hull=energy_above_hull \
  +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.dft_band_gap=dft_band_gap \
  ~trainer.logger \
  data_module.properties=["chemical_system","energy_above_hull","dft_band_gap"] \
  trainer.max_epochs=100 \
  lightning_module.optimizer_partial.lr=2e-6 \
  hydra.run.dir=$STEP2_DIR

# Step 3: Add space_group
export FINAL_DIR="outputs/final_all_properties_$(date +%Y%m%d_%H%M%S)"

mattergen-finetune \
  adapter.model_path=$STEP2_DIR \
  data_module=mp_20 \
  +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.chemical_system=chemical_system \
  +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.energy_above_hull=energy_above_hull \
  +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.dft_band_gap=dft_band_gap \
  +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.space_group=space_group \
  ~trainer.logger \
  data_module.properties=["chemical_system","energy_above_hull","dft_band_gap","space_group"] \
  trainer.max_epochs=100 \
  lightning_module.optimizer_partial.lr=1e-6 \
  hydra.run.dir=$FINAL_DIR

# Configuration 3: High-Performance Setup for Large Dataset
# ---------------------------------------------------------
# For alex_mp_20 dataset with optimized settings

export MODEL_NAME="mattergen_base"
export OUTPUT_DIR="outputs/high_perf_multi_prop_$(date +%Y%m%d_%H%M%S)"

mattergen-finetune \
  adapter.pretrained_name=$MODEL_NAME \
  data_module=alex_mp_20 \
  +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.chemical_system=chemical_system \
  +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.energy_above_hull=energy_above_hull \
  +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.dft_band_gap=dft_band_gap \
  +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.space_group=space_group \
  ~trainer.logger \
  data_module.properties=["chemical_system","energy_above_hull","dft_band_gap","space_group"] \
  data_module.batch_size=128 \
  trainer.accumulate_grad_batches=4 \
  trainer.max_epochs=300 \
  lightning_module.optimizer_partial.lr=5e-6 \
  trainer.gradient_clip_val=1.0 \
  hydra.run.dir=$OUTPUT_DIR

# Configuration 4: Full Fine-tuning (More Parameters Updated)
# ----------------------------------------------------------
# Updates more model parameters, requires more memory but may give better results

export OUTPUT_DIR="outputs/full_finetune_$(date +%Y%m%d_%H%M%S)"

mattergen-finetune \
  adapter.pretrained_name=mattergen_base \
  adapter.full_finetuning=true \
  data_module=mp_20 \
  +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.chemical_system=chemical_system \
  +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.energy_above_hull=energy_above_hull \
  +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.dft_band_gap=dft_band_gap \
  +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.space_group=space_group \
  ~trainer.logger \
  data_module.properties=["chemical_system","energy_above_hull","dft_band_gap","space_group"] \
  trainer.max_epochs=150 \
  lightning_module.optimizer_partial.lr=1e-6 \
  trainer.accumulate_grad_batches=2 \
  hydra.run.dir=$OUTPUT_DIR

# =============================================================================
# GENERATION CONFIGURATIONS
# =============================================================================

# After fine-tuning, use one of these commands to generate structures

# Basic generation (matches the target command)
export MODEL_PATH="outputs/your_finetuned_model"  # Replace with actual path
export RESULTS_PATH="results/target_generation_$(date +%Y%m%d_%H%M%S)"

python mattergen/scripts/generate.py "$RESULTS_PATH" \
  --model_path="$MODEL_PATH" \
  --batch_size=16 \
  --num_batches=1 \
  --chemical_system_mode contains \
  --properties_to_condition_on="{'chemical_system': ['O'], 'energy_above_hull': 0.05, 'dft_band_gap': 1.4, 'space_group': 221}"

# High-throughput generation
python mattergen/scripts/generate.py "$RESULTS_PATH" \
  --model_path="$MODEL_PATH" \
  --batch_size=32 \
  --num_batches=10 \
  --chemical_system_mode contains \
  --properties_to_condition_on="{'chemical_system': ['O'], 'energy_above_hull': 0.05, 'dft_band_gap': 1.4, 'space_group': 221}" \
  --diffusion_guidance_factor=2.0

# Alternative property values for exploration
python mattergen/scripts/generate.py "$RESULTS_PATH" \
  --model_path="$MODEL_PATH" \
  --batch_size=16 \
  --num_batches=5 \
  --chemical_system_mode contains \
  --properties_to_condition_on="{'chemical_system': ['O'], 'energy_above_hull': 0.03, 'dft_band_gap': 2.0, 'space_group': 221}"

# Different space group exploration
python mattergen/scripts/generate.py "$RESULTS_PATH" \
  --model_path="$MODEL_PATH" \
  --batch_size=16 \
  --num_batches=1 \
  --chemical_system_mode contains \
  --properties_to_condition_on="{'chemical_system': ['O'], 'energy_above_hull': 0.05, 'dft_band_gap': 1.4, 'space_group': 225}"

# =============================================================================
# MONITORING AND EVALUATION
# =============================================================================

# Monitor training progress
tail -f $OUTPUT_DIR/train.log

# Check validation loss convergence
grep "val_loss" $OUTPUT_DIR/train.log | tail -20

# Evaluate generated structures
mattergen-evaluate \
  --structures_path=$RESULTS_PATH \
  --relax=True \
  --structure_matcher='disordered' \
  --save_as="$RESULTS_PATH/metrics.json"

# =============================================================================
# TROUBLESHOOTING COMMANDS
# =============================================================================

# If you encounter memory issues:
# - Reduce batch_size: data_module.batch_size=32
# - Increase gradient accumulation: trainer.accumulate_grad_batches=8
# - Use smaller model: adapter.pretrained_name=mp_20_base

# If training doesn't converge:
# - Lower learning rate: lightning_module.optimizer_partial.lr=1e-6
# - Increase epochs: trainer.max_epochs=400
# - Add gradient clipping: trainer.gradient_clip_val=0.5

# Check dataset properties:
python -c "
import pandas as pd
df = pd.read_csv('datasets/mp_20/train.csv')
print('Available properties:', [col for col in df.columns if col not in ['structure', 'cif_id']])
print('Dataset size:', len(df))
"